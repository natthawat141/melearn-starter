name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint + build the application packages.
  # ---------------------------------------------------------------------------
  app:
    name: ${{ matrix.app }} (lint + build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [frontend, backend]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders so `next build` doesn't fail on missing
          # env. Real values are injected at runtime from Secret Manager.
          NEXT_TELEMETRY_DISABLED: "1"
          PAYLOAD_SECRET: "ci-placeholder-secret"
          DATABASE_URL: "postgres://placeholder:placeholder@localhost:5432/placeholder"

  # ---------------------------------------------------------------------------
  # Validate Terraform formatting and configuration (no cloud credentials).
  # ---------------------------------------------------------------------------
  terraform:
    name: terraform (fmt + validate)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]
    defaults:
      run:
        working-directory: infra/terraform/envs/${{ matrix.env }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive ../../

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.53.0

      - name: tflint
        run: |
          tflint --init
          tflint --recursive --chdir ../../
